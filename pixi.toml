[workspace]
authors = ["leopoldkuchta"]
channels = ["conda-forge", "bioconda"]
name = "bioinformatcs_datascience_project"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = "3.12.*"
r-base = ">=4.5.3,<4.6"
r-biocmanager = ">=1.30.27,<2"
r-reticulate = ">=1.45.0,<2"

[tasks]
setup-r-packages = """
Rscript -e \"
dir.create('./.pixi/R_libs', showWarnings=FALSE);
install.packages(c(),
    lib='./.pixi/R_libs',
    repos=c(
        CRAN = 'https://cloud.r-project.org',
        bioc = BiocManager::repositories(),
        # add r-universe repos as needed https://r-universe.dev/packages
    )
)\"
"""
# installs R packages defined in c('xyz','xyz') - only add packages here that you cannot
# find in the conda-forge and bioconda ecosystems (use as a last resort).
# Run this task only once, when first setting up the environment
# Creates R user libs inside .pixi, ensuring isolation. Be warned that these
# packages are not added to the pixi lock file

[activation]
env = { R_LIBS_USER = "./.pixi/R_libs" } # points R user libs to our custom location
